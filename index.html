<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="2026年度3年生 JavaScript作品一覧">
  <title>JavaScript 作品一覧</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-shell">
    <header class="page-header">
      <div>
        <div class="title-line">
          <h1>JavaScript 作品一覧</h1>
          <span class="student-count" id="student-count" aria-label="登録学生数"></span>
        </div>
        <p>学生の作品を選んで開くことができます。</p>
      </div>
      <div class="class-mark" aria-hidden="true">2026<span>3年</span></div>
    </header>

    <section class="works" aria-labelledby="works-heading">
      <h2 id="works-heading" class="sr-only">学生作品</h2>
      <div class="list-heading" aria-hidden="true">
        <span>番号</span>
        <span>学生名</span>
        <span>作品</span>
      </div>
      <div id="student-list" class="student-list"></div>
    </section>

    <footer>
      <p>リンクを選ぶと新しいタブで作品が開きます。</p>
    </footer>
  </main>
  <script src="script.js"></script>
</body>
</html>
