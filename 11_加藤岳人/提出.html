<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Tools Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:        #0c1018;
    --panel:     #171d29;
    --panel-2:   #232b3a;
    --line:      #3a4658;
    --text:      #e7edf5;
    --text-dim:  #8b98ad;
    --accent:    #63b3ed;
    --accent-2:  #2b6cb0;
    --accent-glow: rgba(99,179,237,.25);
    --warn:      #ecc94b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(circle at 15% 10%, rgba(99,179,237,.07), transparent 45%),
      radial-gradient(circle at 85% 90%, rgba(43,108,176,.10), transparent 50%),
      var(--bg);
    color:var(--text);
    font-family:'JetBrains Mono', monospace;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
  }

  /* --- ambient drifting file/tool glyphs --- */
  #dust{position:absolute;inset:0;z-index:0;}
  .mote{
    position:absolute;
    color:var(--line);
    opacity:.4;
    animation:drift linear infinite;
    user-select:none;
  }
  @keyframes drift{
    0%{transform:translate(0,0) rotate(0deg);}
    50%{transform:translate(6px,-12px) rotate(6deg);}
    100%{transform:translate(0,0) rotate(0deg);}
  }

  .stage{
    position:relative;
    z-index:1;
    width:min(580px, 92vw);
    background:linear-gradient(160deg, var(--panel) 0%, #0a0e16 100%);
    border:1px solid var(--line);
    border-radius:14px;
    padding:48px 44px 40px;
    box-shadow:
      0 40px 80px -30px rgba(0,0,0,.8),
      0 0 0 1px rgba(255,255,255,.02) inset;
  }

  .eyebrow{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:.68rem;
    letter-spacing:.32em;
    color:var(--text-dim);
    text-transform:uppercase;
    margin-bottom:16px;
  }
  .eyebrow .tag{color:var(--accent);}
  .eyebrow::after{
    content:"";
    flex:1;
    height:1px;
    background:linear-gradient(90deg, var(--line), transparent);
  }

  h1{
    font-family:'Bebas Neue', sans-serif;
    font-size:clamp(2.4rem, 7.5vw, 3.3rem);
    letter-spacing:.03em;
    line-height:1.02;
    color:var(--text);
    margin-bottom:8px;
  }
  h1 span{
    background:linear-gradient(120deg, var(--accent), #90cdf4);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .subtitle{
    color:var(--text-dim);
    font-size:.85rem;
    line-height:1.6;
    margin-bottom:28px;
    padding-bottom:24px;
    border-bottom:1px solid var(--line);
  }

  .info-block{
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:8px;
    padding:14px 16px;
    margin-bottom:14px;
    position:relative;
    overflow:hidden;
  }
  .info-block::before{
    content:"";
    position:absolute;
    left:0; top:0; bottom:0;
    width:3px;
    background:var(--accent);
  }
  .info-block.warn::before{ background:var(--warn); }

  .info-block h2{
    font-family:'JetBrains Mono', monospace;
    font-size:.7rem;
    font-weight:700;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:8px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .info-block.warn h2{ color:var(--warn); }

  .info-block p{
    font-size:.8rem;
    line-height:1.75;
    color:var(--text-dim);
    white-space:pre-wrap;
  }
  .info-block ul{
    font-size:.8rem;
    line-height:1.9;
    color:var(--text-dim);
    list-style:none;
  }
  .info-block ul li{
    padding-left:1.2em;
    position:relative;
  }
  .info-block ul li::before{
    content:"▹";
    position:absolute;
    left:0;
    color:var(--accent);
  }

  .actions{margin-top:28px;}

  .btn{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    padding:18px 20px;
    font-family:'JetBrains Mono', monospace;
    font-size:1rem;
    font-weight:700;
    letter-spacing:.06em;
    border-radius:9px;
    cursor:pointer;
    border:none;
    color:#eff8ff;
    background:linear-gradient(135deg, var(--accent-2), #1e5a94);
    box-shadow:0 4px 0 #163d63, 0 12px 24px -8px var(--accent-glow);
    transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
    overflow:hidden;
  }
  .btn::after{
    content:"";
    position:absolute;
    top:0; left:-60%;
    width:40%; height:100%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,.16), transparent);
    transform:skewX(-20deg);
    transition:left .5s ease;
  }
  .btn:hover::after{ left:130%; }
  .btn:hover{ filter:brightness(1.08); transform:translateY(-2px); box-shadow:0 6px 0 #163d63, 0 14px 28px -8px var(--accent-glow); }
  .btn:active{ transform:translateY(2px); box-shadow:0 2px 0 #163d63, 0 8px 16px -8px var(--accent-glow); }

  .btn .arrow{ transition:transform .2s ease; }
  .btn:hover .arrow{ transform:translateX(4px); }

  footer{
    position:absolute;
    bottom:16px;
    left:0; right:0;
    text-align:center;
    font-size:.66rem;
    letter-spacing:.08em;
    color:var(--line);
    z-index:1;
  }
</style>
</head>
<body>

<div id="dust"></div>

<div class="stage">
  <div class="eyebrow"><span class="tag">//</span> tool hub</div>
  <h1>HTML<span>Tools</span>Management</h1>
  <div class="subtitle">今まで作成したHTMLツール群を、ひとつの入口にまとめました。</div>

  <!-- ============================================================
       コンセプト：ここに直接書き込んでください（p タグの中身を編集）
  ============================================================= -->
  <div class="info-block warn">
    <h2>制作動機</h2>
    <p>AIに作成してもらったHTMLツールが増えてきたので、ひとまとめにしたい。</p>
  </div>

  <div class="info-block">
    <h2>コンセプト</h2>
    <p>散らばっていたツール類を1か所に集約し、迷わずアクセスできる入口を作る。</p>
  </div>

  <!-- ============================================================
       内容：li を増減して自由に編集してください
  ============================================================= -->
  <div class="info-block">
    <h2>内容</h2>
    <ul>
      <li>今まで作成したHTMLツールをまとめたもの</li>
    </ul>
  </div>

  <div class="actions">
    <button class="btn" id="btn-start">Tool GO <span class="arrow">→</span></button>
  </div>
</div>

<footer>HTML TOOLS MANAGEMENT</footer>

<script>
  // ------------------------------------------------------------------
  // ↓↓↓ ここにGitHub Pagesで公開したツール本体のURLを直接書いてください
  // ------------------------------------------------------------------
  const TOOL_URL = "https://katou-gakuto.github.io/HtmlToolManagement/";

  document.getElementById('btn-start').addEventListener('click', () => {
    window.location.href = TOOL_URL;
  });

  // --- decorative drifting file/tool glyphs ---
  const glyphs = ["📄","📁","🗂️","🧰","🗃️","</>"];
  const dust = document.getElementById('dust');
  for(let i=0;i<20;i++){
    const el = document.createElement('div');
    el.className = 'mote';
    el.textContent = glyphs[i % glyphs.length];
    el.style.left = (Math.random()*100) + 'vw';
    el.style.top = (Math.random()*100) + 'vh';
    el.style.animationDuration = (4 + Math.random()*5) + 's';
    el.style.fontSize = (0.9 + Math.random()*1.3) + 'rem';
    dust.appendChild(el);
  }
</script>

</body>
</html>
